name: Nightly Build

permissions:
  contents: read

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_name: Linux
            arch: x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            os_name: Linux
            arch: aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            os_name: macOS
            arch: aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: Windows
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          MAJOR=$(echo $VERSION | cut -d '.' -f 1)
          MINOR=$(echo $VERSION | cut -d '.' -f 2)
          PATCH=$(echo $VERSION | cut -d '.' -f 3)
          echo "full=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ runner.os }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libasound2-dev libxkbcommon-x11-dev minisign

      - name: Install minisign (macOS)
        if: runner.os == 'macOS'
        run: brew install minisign

      - name: Install minisign (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install minisign -y

      - name: Install WiX Toolset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset --version=3.14.1 -y --no-progress
          $candidatePaths = @(
            "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin",
            "${env:ProgramFiles}\WiX Toolset v3.14\bin",
            "C:\Program Files (x86)\WiX Toolset v3.14\bin",
            "C:\Program Files\WiX Toolset v3.14\bin"
          )
          $wixPath = $candidatePaths | Where-Object { Test-Path (Join-Path $_ 'candle.exe') } | Select-Object -First 1
          if (-Not $wixPath) {
            Write-Host "Searching for candle.exe under Program Files..."
            $found = Get-ChildItem -Path "C:\Program Files (x86)","C:\Program Files" -Filter candle.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $wixPath = $found.Directory.FullName }
          }
          if (-Not $wixPath) {
            throw "WiX bin path with candle.exe not found"
          }
          Write-Host "Using WiX bin path: $wixPath"
          $wixPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$wixPath;$env:PATH"
          where.exe candle.exe
          candle.exe -? | Select-Object -First 2
          light.exe -? | Select-Object -First 2

      - name: Install cargo-packager
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-packager@0.11.8

      - name: Build and Package
        id: package
        run: cargo packager --release

      - name: Dump WiX diagnostics (Windows)
        if: failure() && runner.os == 'Windows'
        shell: pwsh
        run: |
          where.exe candle.exe
          where.exe light.exe
          Get-ChildItem -Path target/release/bundles/.cargo-packager -Recurse -ErrorAction SilentlyContinue
          $wixRoot = "target/release/bundles/.cargo-packager/wix"
          if (Test-Path $wixRoot) {
            Get-ChildItem -Path $wixRoot -Filter *.wxs -Recurse | ForEach-Object {
              Write-Host "==== $($_.FullName) ===="
              Get-Content -Path $_.FullName
            }
          }

      - name: CodeSign macOS
        if: runner.os == 'macOS'
        run: codesign --force --deep --sign - target/release/bundles/*.app

      - name: Sign binaries
        shell: bash
        run: |
          echo "${{ secrets.MINISIGN_SECRET_KEY }}" > minisign.key
          for f in target/release/bundles/*; do
            [ -f "$f" ] && echo "${{ secrets.MINISIGN_PASSWORD }}" | minisign -Sm "$f" -s minisign.key
          done
          rm -f minisign.key

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd target/release/bundles
          sha256sum *.{dmg,msi,deb,AppImage,tar.gz} 2>/dev/null > SHA256SUMS.txt || true

      - name: Sign SHA256SUMS
        shell: bash
        run: |
          echo "${{ secrets.MINISIGN_SECRET_KEY }}" > minisign.key
          echo "${{ secrets.MINISIGN_PASSWORD }}" | minisign -Sm target/release/bundles/SHA256SUMS.txt -s minisign.key
          rm -f minisign.key

      - name: Rename artifacts
        shell: bash
        run: |
          ARCH_LOWER=$(echo "${{ matrix.arch }}" | tr '[:upper:]' '[:lower:]')
          PREFIX="Vleer-${{ steps.version.outputs.full }}-${ARCH_LOWER}"
          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT
          cd target/release/bundles
          for f in *; do
            [[ "$f" == *.minisig ]] && continue
            [[ "$f" == "SHA256SUMS.txt" ]] && continue
            [[ -f "$f" ]] || continue
            EXT="${f#*.}"
            mv "$f" "${PREFIX}.${EXT}"
            [[ -f "${f}.minisig" ]] && mv "${f}.minisig" "${PREFIX}.${EXT}.minisig"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.full }}_${{ matrix.os_name }}_${{ matrix.arch }}
          path: |
            target/release/bundles/*
