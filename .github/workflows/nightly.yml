name: Nightly Build

permissions:
  contents: read

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          MAJOR=$(echo $VERSION | cut -d '.' -f 1)
          MINOR=$(echo $VERSION | cut -d '.' -f 2)
          PATCH=$(echo $VERSION | cut -d '.' -f 3)
          echo "full=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ runner.os }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libasound2-dev libxkbcommon-x11-dev

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-packager
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-packager
          version: "0.11"

      - name: Build and Package
        run: cargo packager --release

      - name: Install minisign
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            curl -sL https://github.com/jedisct1/minisign/releases/latest/download/minisign-linux-x86_64.tar.gz | tar xz -C /usr/local/bin --strip-components=1
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install minisign
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            choco install minisign -y
          fi

      - name: Write minisign secret key
        shell: bash
        run: printf '%s' "$MINISIGN_SECRET_KEY" | base64 -d > /tmp/minisign.key
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}

      - name: Sign binaries
        shell: bash
        run: |
          # macOS: ad-hoc codesigning
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            codesign --force --deep --sign - target/release/bundles/*.app
          fi

          # All platforms: minisign signatures
          for file in target/release/bundles/*; do
            if [[ -f "$file" && ! "$file" =~ \.minisig$ ]]; then
              echo "Signing $file"
              minisign -Sm "$file" -s /tmp/minisign.key <<< "$MINISIGN_PASSWORD"
            fi
          done
        env:
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}

      - name: Create SHA256SUMS
        shell: bash
        run: |
          cd target/release/bundles
          sha256sum *.{dmg,msi,deb,AppImage,tar.gz} 2>/dev/null > SHA256SUMS.txt || true
          minisign -Sm SHA256SUMS.txt -s /tmp/minisign.key <<< "$MINISIGN_PASSWORD"
        env:
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}

      - name: Clean up secret key
        if: always()
        shell: bash
        run: rm -f /tmp/minisign.key

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vleer-${{ matrix.target }}
          path: |
            target/release/bundles/*
            target/release/bundles/*.minisig
