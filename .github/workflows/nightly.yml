name: Nightly Build

permissions:
  contents: read
  actions: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_name: Linux
            arch: x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            os_name: Linux
            arch: aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            os_name: macOS
            arch: aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: Windows
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Extract version from Cargo.toml
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          MAJOR=$(echo $VERSION | cut -d '.' -f 1)
          MINOR=$(echo $VERSION | cut -d '.' -f 2)
          PATCH=$(echo $VERSION | cut -d '.' -f 3)
          echo "full=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ runner.os }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libasound2-dev libxkbcommon-x11-dev

      - name: Install WiX Toolset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset --version=3.14.1 -y --no-progress
          $candidatePaths = @(
            "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin",
            "${env:ProgramFiles}\WiX Toolset v3.14\bin",
            "C:\Program Files (x86)\WiX Toolset v3.14\bin",
            "C:\Program Files\WiX Toolset v3.14\bin"
          )
          $wixPath = $candidatePaths | Where-Object { Test-Path (Join-Path $_ 'candle.exe') } | Select-Object -First 1
          if (-Not $wixPath) {
            Write-Host "Searching for candle.exe under Program Files..."
            $found = Get-ChildItem -Path "C:\Program Files (x86)","C:\Program Files" -Filter candle.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $wixPath = $found.Directory.FullName }
          }
          if (-Not $wixPath) {
            throw "WiX bin path with candle.exe not found"
          }
          Write-Host "Using WiX bin path: $wixPath"
          $wixPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$wixPath;$env:PATH"
          where.exe candle.exe
          candle.exe -? | Select-Object -First 2
          light.exe -? | Select-Object -First 2

      - name: Install cargo-packager
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-packager@0.11.8
          fallback: cargo-install

      - name: Build and Package
        id: package
        run: cargo packager --release

      - name: Dump WiX diagnostics (Windows)
        if: failure() && runner.os == 'Windows'
        shell: pwsh
        run: |
          where.exe candle.exe
          where.exe light.exe
          Get-ChildItem -Path target/release/bundles/.cargo-packager -Recurse -ErrorAction SilentlyContinue
          $wixRoot = "target/release/bundles/.cargo-packager/wix"
          if (Test-Path $wixRoot) {
            Get-ChildItem -Path $wixRoot -Filter *.wxs -Recurse | ForEach-Object {
              Write-Host "==== $($_.FullName) ===="
              Get-Content -Path $_.FullName
            }
          }

      - name: Locate unsigned Windows MSI
        if: runner.os == 'Windows'
        id: locate-msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path target/release/bundles -Filter *.msi -File | Select-Object -First 1
          if (-Not $msi) { throw "No .msi found in target/release/bundles" }
          "path=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "name=$($msi.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload unsigned Windows MSI for SignPath
        if: runner.os == 'Windows'
        id: upload-unsigned-windows
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.locate-msi.outputs.path }}
          archive: false

      - name: Submit SignPath signing request (Windows)
        if: runner.os == 'Windows'
        id: signpath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: '${{ secrets.SIGNPATH_PROJECT_SLUG }}'
          signing-policy-slug: '${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}'
          github-artifact-id: '${{ steps.upload-unsigned-windows.outputs.artifact-id }}'
          wait-for-completion: true
          skip-decompress: true
          output-artifact-directory: 'signpath-signed'

      - name: Replace unsigned MSI with signed (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          SIGNED=$(find signpath-signed -type f -name '*.msi' | head -n 1)
          if [ -z "$SIGNED" ]; then
            echo "No signed .msi found under signpath-signed:"
            find signpath-signed -type f
            exit 1
          fi
          mv -f "$SIGNED" "${{ steps.locate-msi.outputs.path }}"
          rm -rf signpath-signed

      - name: Delete unsigned MSI actions artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ART_ID="${{ steps.upload-unsigned-windows.outputs.artifact-id }}"
          gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$ART_ID"

      - name: Install GnuPG (macOS)
        if: runner.os == 'macOS'
        run: brew install gnupg

      - name: Sign binaries
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          for f in target/release/bundles/*; do
            [ -f "$f" ] || continue
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --detach-sign --armor --output "$f.sig" "$f"
          done

      - name: Rename artifacts
        id: rename
        shell: bash
        run: |
          ARCH_LOWER=$(echo "${{ matrix.arch }}" | tr '[:upper:]' '[:lower:]')
          PREFIX="Vleer-${{ steps.version.outputs.full }}-${ARCH_LOWER}"
          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT
          cd target/release/bundles
          for f in *; do
            [[ "$f" == *.sig ]] && continue
            [[ -f "$f" ]] || continue
            case "$f" in
              *.tar.gz) EXT="tar.gz" ;;
              *.tar.xz) EXT="tar.xz" ;;
              *.pkg.tar.zst) EXT="pkg.tar.zst" ;;
              *) EXT="${f##*.}" ;;
            esac
            mv "$f" "${PREFIX}.${EXT}"
            [[ -f "${f}.sig" ]] && mv "${f}.sig" "${PREFIX}.${EXT}.sig"
          done

      - name: Upload MSI (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          path: target/release/bundles/${{ steps.rename.outputs.prefix }}.msi
          archive: false

      - name: Upload MSI signature (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          path: target/release/bundles/${{ steps.rename.outputs.prefix }}.msi.sig
          archive: false

      - name: Upload DMG (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          path: target/release/bundles/${{ steps.rename.outputs.prefix }}.dmg
          archive: false

      - name: Upload DMG signature (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          path: target/release/bundles/${{ steps.rename.outputs.prefix }}.dmg.sig
          archive: false

      - name: Upload DEB (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          path: target/release/bundles/${{ steps.rename.outputs.prefix }}.deb
          archive: false

      - name: Upload DEB signature (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          path: target/release/bundles/${{ steps.rename.outputs.prefix }}.deb.sig
          archive: false

      - name: Upload AppImage (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          path: target/release/bundles/${{ steps.rename.outputs.prefix }}.AppImage
          archive: false

      - name: Upload AppImage signature (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          path: target/release/bundles/${{ steps.rename.outputs.prefix }}.AppImage.sig
          archive: false
