name: Nightly Build

permissions:
  contents: read

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          MAJOR=$(echo $VERSION | cut -d '.' -f 1)
          MINOR=$(echo $VERSION | cut -d '.' -f 2)
          PATCH=$(echo $VERSION | cut -d '.' -f 3)
          echo "full=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ runner.os }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libasound2-dev libxkbcommon-x11-dev

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-packager
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-packager
          version: "0.11"

      - name: Build and Package
        run: cargo packager --release

      - name: CodeSign macOS
        if: runner.os == 'macOS'
        run: codesign --force --deep --sign - target/release/bundles/*.app

      - name: Sign binaries
        uses: thomasdesr/minisign-action@v1
        with:
          args: -Sm target/release/bundles/*
          minisign_key: ${{ secrets.MINISIGN_SECRET_KEY }}
          password: ${{ secrets.MINISIGN_PASSWORD }}

      - name: Sign SHA256SUMS
        shell: bash
        run: |
          cd target/release/bundles
          sha256sum *.{dmg,msi,deb,AppImage,tar.gz} 2>/dev/null > SHA256SUMS.txt || true
        if: always()

      - name: Sign SHA256SUMS
        uses: thomasdesr/minisign-action@v1
        with:
          args: -Sm target/release/bundles/SHA256SUMS.txt
          minisign_key: ${{ secrets.MINISIGN_SECRET_KEY }}
          password: ${{ secrets.MINISIGN_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vleer-${{ matrix.target }}
          path: |
            target/release/bundles/*
            target/release/bundles/*.minisig
